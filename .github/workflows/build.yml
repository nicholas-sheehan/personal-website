name: Build & Deploy

on:
  # Run daily at 9am AEDT / 8am AEST (10pm UTC)
  schedule:
    - cron: "0 22 * * *"
  # Run on push to main or staging
  push:
    branches: [main, staging]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build script
        env:
          GRAVATAR_API_KEY: ${{ secrets.GRAVATAR_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_OAUTH_TOKEN: ${{ secrets.INSTAPAPER_OAUTH_TOKEN }}
          INSTAPAPER_OAUTH_TOKEN_SECRET: ${{ secrets.INSTAPAPER_OAUTH_TOKEN_SECRET }}
        run: python build.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html og-image.png
          git diff --cached --quiet || git commit -m "Update feeds"
          git push

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pull latest (includes build commit)
        run: git pull origin ${{ github.ref_name }}

      - name: Assemble site files
        run: |
          mkdir _site
          cp index.html og-image.png sitemap.xml favicon.png favicon-192.png favicon.ico robots.txt _site/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=nicsheehan --branch=${{ github.ref_name }}
